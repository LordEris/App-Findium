    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Contrôles ─────────────────────────────────────────────────────────────────

// Slider avec label et valeur affichée (ex : "16px")
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

// Toggle on/off (interrupteur iOS-style)
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

// Sélecteur radio segmenté (type "segmented control").
// Si les options sont trop longues ou trop nombreuses, bascule automatiquement
// sur un <select> via TweakSelect pour éviter les débordements.
// Le sélecteur supporte le drag horizontal pour changer de segment sans clic.
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // valueRef permet aux handlers de drag (closures longue durée)
  // de lire la valeur courante sans re-créer les listeners.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Heuristique : longueur max des labels × nombre d'options
  // pour décider si le segmented control tient dans 248px de largeur.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // Fallback <select> — préserve le type de valeur (number, boolean…)
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx  = Math.max(0, opts.findIndex((o) => o.value === value));
  const n    = opts.length;

  // Calcule l'index du segment sous le pointeur
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup',   up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup',   up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        {/* Poignée de sélection animée par CSS */}
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

// Sélecteur <select> natif (fallback de TweakRadio ou usage direct)
function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

// Champ texte libre
function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

// Champ numérique avec scrub horizontal (cliquer-glisser sur le label)
// et contrainte min/max/step. Le step gère aussi les décimales.
function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx  = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup',   up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup',   up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// ── Utilitaire de contraste pour TweakColor ───────────────────────────────────
// Calcule la luminosité relative (formule ITU-R BT.601) d'un hex #rgb ou #rrggbb
// pour choisir une couleur de coche lisible sur le swatch sélectionné.
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

// Coche SVG affichée sur le swatch actif (couleur adaptée au contraste)
const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// Sélecteur de couleur / palette.
// Chaque option est soit un string hex (couleur unique),
// soit un tableau de strings (palette : hero à gauche + colonnes à droite).
// Sans options : bascule sur l'input natif type="color".
// onChange émet la valeur dans le même format que l'option passée (string ou array).
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Comparaison insensible à la casse (input type=color retourne du lowercase)
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4); // max 4 couleurs secondaires dans la colonne
          const on  = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

// Bouton d'action simple (primaire ou secondaire)
function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

// Export global — tous les composants accessibles depuis les fichiers JSX
Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>
  <script type="text/babel">
/**
 * data.jsx — Données de démonstration et catalogues statiques
 *
 * Ce fichier ne contient aucune logique applicative — uniquement des données :
 *
 *   SOURCES_CATALOG      : liste des 12 sources OSINT disponibles avec leur
 *                          identifiant, nom, description, latence et état initial.
 *                          Utilisé dans NewInvestigation (sélecteur de sources)
 *                          et Config (panneau de gestion des sources).
 *
 *   INPUT_TYPES          : types d'indices acceptés en entrée d'enquête
 *                          (nom, alias, email, téléphone, adresse, URL, note, doc).
 *                          Définit les labels, placeholders et glyphs de l'UI.
 *
 *   DEMO_INVESTIGATIONS  : 6 enquêtes pré-remplies pour la démonstration.
 *                          La première (INV-2317) est complète avec log, entités,

  <script type="text/babel">
/**
 * atoms.jsx — Composants atomiques réutilisables
 *
 * Regroupe tous les petits éléments visuels partagés dans l'interface :
 *   Clock       : horloge UTC temps réel (mise à jour chaque seconde)
 *   Spark       : mini graphique en barres sparkline
 *   StatusTag   : badge coloré pour le statut d'une enquête
 *   SourceStatus: indicateur compact pour l'état d'une source OSINT
 *   ConfBar     : barre de confiance avec pourcentage
 *   Bar         : barre de progression générique
 *   typeIcon    : fonction utilitaire — glyph texte selon le type d'entité
 *   Icon        : ensemble d'icônes SVG inline (pas de dépendance externe)
 *   Logo        : petit logo Findium (loupe + point central)

 * autres fichiers JSX chargés via <script type="text/babel">.
 */
const { useEffect, useState, useRef, useMemo, useCallback } = React;

// ─── Clock ────────────────────────────────────────────────────────────────────
// Affiche l'heure UTC courante au format HH:MM:SS.
// setInterval de 1 seconde, nettoyé à la destruction du composant.
function Clock() {
  const [t, setT] = useState(() => new Date());
  useEffect(() => {
    const i = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(i);
  }, []);
  const pad = (n) => String(n).padStart(2, "0");
  return (
    <span className="topbar__clock" style={{fontFamily:"var(--font-mono)",color:"var(--accent)",fontSize:12}}>
      {pad(t.getUTCHours())}:{pad(t.getUTCMinutes())}:{pad(t.getUTCSeconds())}
      <span style={{color:"var(--fg-3)",marginLeft:6,fontSize:11}}>UTC</span>
    </span>
  );
}

// ─── Spark ────────────────────────────────────────────────────────────────────
// Sparkline en barres verticales.
//   values : tableau de nombres (ex : historique d'activité)
//   h      : hauteur totale en px (les barres s'y adaptent proportionnellement)
function Spark({ values = [3,5,2,7,4,8,3,6,9,5,4,7], h = 14 }) {
  const max = Math.max(...values) || 1;
  return (
    <span className="spark" style={{ height: h }}>
      {values.map((v, i) => (
        <span key={i} style={{ height: (v / max) * h, opacity: 0.4 + (v / max) * 0.6 }} />
      ))}
    </span>
  );
}

// ─── StatusTag ────────────────────────────────────────────────────────────────
// Badge rond coloré représentant le statut d'une enquête.
// Le statut "running" pulse visuellement pour indiquer l'activité.
function StatusTag({ status, small }) {
  const map = {
    running:   { cls: "tag--ok",     txt: "EN COURS",  pulse: true },
    complete:  { cls: "tag--info",   txt: "TERMINÉE",  pulse: false },
    paused:    { cls: "tag--warn",   txt: "PAUSE",     pulse: false },
    archived:  { cls: "",            txt: "ARCHIVÉE",  pulse: false },
    aborted:   { cls: "tag--err",    txt: "ABANDONNÉE",pulse: false },
  };
  const s = map[status] || { cls: "", txt: status, pulse: false };
  return (
    <span className={"tag " + s.cls} style={small ? {fontSize:10, padding:"2px 7px"} : null}>
      <span className={"dot" + (s.pulse ? " dot--pulse" : "")}></span>
      {s.txt}
    </span>
  );
}

// ─── SourceStatus ─────────────────────────────────────────────────────────────
// Indicateur texte compact pour l'état d'une source OSINT dans le terminal.
// Utilise les variables de couleur du thème (acc / warn / err / mute / info).
function SourceStatus({ status }) {
  const map = {
    hit:        { cls: "acc",  txt: "HIT" },
    partial:    { cls: "warn", txt: "PARTIAL" },
    querying:   { cls: "info", txt: "QUERY" },

    ok:         { cls: "acc",  txt: "OK" },
    error:      { cls: "err",  txt: "ERR" },
  };
  const s = map[status] || { cls: "mute", txt: status?.toUpperCase() || "?" };
  return <span className={s.cls} style={{fontFamily:"var(--font-mono)", fontSize:11, fontWeight:500}}>{s.txt}</span>;
}

// ─── ConfBar ─────────────────────────────────────────────────────────────────
// Barre de confiance horizontale + pourcentage.
//   value : flottant 0-1 (ex : 0.82 → "82%")
// La largeur de remplissage est injectée via la variable CSS --w

function ConfBar({ value = 0 }) {

  <script type="text/babel">
/**
 * graph.jsx — Visualisations graphiques OSINT
 *
 * Deux composants de visualisation :
 *
 *   NetworkGraph : graphe de relations force-dirigé
 *     - Layout calculé via simulation itérative (220 itérations)
 *       combinant répulsion noeuds-noeuds, attraction des arêtes
 *       et gravité centrée douce.
 *     - Les noeuds sont déplaçables (drag pointer) et "épinglés"
 *       après déplacement — setPinned() mémorise les positions manuelles
 *       et les préserve lors des mises à jour du layout.
 *     - Taille des noeuds proportionnelle à la confiance (conf).
 *     - Arêtes en tirets si conf < 0.6 (lien faible / incertain).
 *     - Filtre SVG "glow" sur les noeuds pour l'effet néon.
 *     - Bouton "↺ Reset layout" affiché uniquement quand des noeuds
 *       ont été épinglés manuellement.
 *
 *   MapView : carte du monde stylisée
 *     - Projection Mercator simplifiée (équirectangulaire approchée).
 *     - Silhouettes continentales en paths SVG (placeholder esthétique,
 *       pas une carte géographique précise).
 *     - Grille de fond + graticule équateur/méridien central.
 *     - Pins avec halo, réticule et coordonnées pour chaque localisation.
 *     - Coins décorés (crosshairs style militaire).
 *
 * Couleurs de type définies dans TYPE_COLORS — exposées aussi pour usage
 * externe (légende, fiche entité).
 */
const { useEffect: _ge, useMemo: _gm, useState: _gs, useRef: _gr } = React;

// ─── Palette de couleurs par type d'entité ────────────────────────────────────
// Chaque type a une teinte distincte dans la famille verte/cyan pour rester
// cohérent avec le thème sans perdre la lisibilité des nœuds.
const TYPE_COLORS = {
  person:   "var(--accent)",
  alias:    "#a0ff66",
  email:    "#7cff9d",
  phone:    "#9effaa",
  address:  "#bfff8c",
  url:      "#5fffd0",
  location: "#5fffd0",
  org:      "#ffd966",
  note:     "#8ad9ff",
  doc:      "#c9b3ff",
};

// ─── NetworkGraph ─────────────────────────────────────────────────────────────
function NetworkGraph({ entities = [], edges = [], onSelect, selectedId, onUpdateEntity }) {
  const svgRef = _gr(null);
  const [positions, setPositions] = _gs(null);
  const [dragId, setDragId] = _gs(null);
  const [pinned, setPinned] = _gs({});
  const dragOffsetRef = _gr({ x: 0, y: 0 });
  const dragMovedRef  = _gr(false);
  const [editId, setEditId] = _gs(null);
  const [overrides, setOverrides] = _gs({});

  // ── Calcul du layout initial ───────────────────────────────────────────────
  // useMemo : ne recalcule que quand entities/edges changent (pas à chaque rendu).
  // Algorithme en 3 passes sur 220 itérations :
  //   1. Répulsion inversement proportionnelle à d² entre toutes les paires
  //   2. Attraction des arêtes vers une distance cible (150px), pondérée par conf
  //   3. Gravité douce vers le centre (0.5% par itération)
  const initialLayout = _gm(() => {
    const W = 900, H = 560;
    const cx = W / 2, cy = H / 2;
    const pos = {};

    // Placement initial en cercle, rayon variable pour éviter les superpositions
    const ids = entities.map(e => e.id);
    const N = ids.length;
    ids.forEach((id, i) => {
      const angle = (i / N) * Math.PI * 2;
      const r = 220 + (i % 3) * 18;
      pos[id] = { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
    });
    // Le premier noeud (sujet principal) est placé au centre
    if (ids[0]) pos[ids[0]] = { x: cx, y: cy };

    for (let it = 0; it < 220; it++) {
      // Répulsion entre toutes les paires
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const a = pos[ids[i]], b = pos[ids[j]];
          let dx = b.x - a.x, dy = b.y - a.y;
          let d2 = dx * dx + dy * dy + 0.1;
          let d = Math.sqrt(d2);
          let f = 8000 / d2;
          dx = (dx / d) * f; dy = (dy / d) * f;
          a.x -= dx; a.y -= dy;
          b.x += dx; b.y += dy;
        }
      }
      // Attraction des arêtes (ressort avec longueur cible 150px)
      edges.forEach((e) => {
        const a = pos[e.from], b = pos[e.to];
        if (!a || !b) return;
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = Math.sqrt(dx * dx + dy * dy) + 0.1;
        const target = 150;
        const k = 0.02 * (e.conf || 0.6);
        const f = (d - target) * k;
        const ux = dx / d, uy = dy / d;
        a.x += ux * f; a.y += uy * f;
        b.x -= ux * f; b.y -= uy * f;
      });
      // Gravité centrée — évite que les noeuds isolés dérivent trop loin
      ids.forEach((id) => {
        const p = pos[id];
        p.x += (cx - p.x) * 0.005;
        p.y += (cy - p.y) * 0.005;
      });
    }
    return { pos, W, H };
  }, [entities, edges]);

  // ── Synchronisation positions ↔ layout ────────────────────────────────────
  // Quand le layout change (nouvelle enquête), on réinitialise les positions
  // SAUF pour les noeuds épinglés manuellement par l'utilisateur.
  _ge(() => {
    setPositions((prev) => {
      const next = { ...initialLayout.pos };
      if (prev) {
        Object.keys(prev).forEach((id) => {
          if (pinned[id] && next[id]) next[id] = prev[id];
        });
      }
      return next;
    });
  }, [initialLayout]);

  const { W, H } = initialLayout;
  const pos = positions || initialLayout.pos;

  // ── Conversion coordonnées client → coordonnées SVG ───────────────────────
  // Nécessaire car le SVG est mis à l'échelle par CSS (viewBox + preserveAspectRatio).
  const toSvg = (clientX, clientY) => {
    const svg = svgRef.current;
    if (!svg) return { x: clientX, y: clientY };
    const rect = svg.getBoundingClientRect();
    const x = ((clientX - rect.left) / rect.width) * W;
    const y = ((clientY - rect.top) / rect.height) * H;
    return { x, y };
  };

  // Début du drag — mémorise l'offset et réinitialise le flag de mouvement
  const onNodeDown = (e, id) => {
    e.stopPropagation();
    dragMovedRef.current = false;
    const { x, y } = toSvg(e.clientX, e.clientY);
    const p = pos[id];
    dragOffsetRef.current = { x: x - p.x, y: y - p.y };
    setDragId(id);
    if (onSelect) onSelect(id);
  };

  // ── Gestionnaires pointer globaux pendant le drag ──────────────────────────
  // Attachés sur window (pas sur le SVG) pour ne pas perdre l'événement
  // quand le curseur sort du SVG à grande vitesse.
  _ge(() => {
    if (!dragId) return;
    const move = (ev) => {
      ev.preventDefault();
      dragMovedRef.current = true;
      const { x, y } = toSvg(ev.clientX, ev.clientY);
      setPositions((prev) => ({
        ...(prev || {}),
        [dragId]: {
          x: Math.max(20, Math.min(W - 20, x - dragOffsetRef.current.x)),
          y: Math.max(20, Math.min(H - 20, y - dragOffsetRef.current.y)),
        },
      }));
    };
    const up = () => {
      if (!dragMovedRef.current) {
        // Simple clic (pas de déplacement) → ouvrir le panneau d'édition
        setEditId(dragId);
      } else {
        // Déplacement réel → épingler la nouvelle position
        setPinned((p) => ({ ...p, [dragId]: true }));
      }
      dragMovedRef.current = false;
      setDragId(null);
    };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
    return () => {
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
    };
  }, [dragId, W, H]);

  // Remet tous les noeuds à leur position calculée par l'algorithme
  const resetLayout = () => {
    setPinned({});
    setPositions({ ...initialLayout.pos });
  };

  return (
    <div className="graph-wrap">
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet"
        style={{ width: "100%", height: "100%", display: "block", userSelect: "none", touchAction: "none" }}>
        <defs>
          {/* Flèche directionnelle — hérite de la couleur du trait (context-stroke) */}
          <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M0,1 L9,5 L0,9 z" fill="context-stroke"/>
          </marker>
          {/* Filtre de lueur néon sur les noeuds */}
          <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>

        {/* Arêtes — couleur distincte des nœuds, épaisseur/opacité selon confiance
            Solide si conf ≥ 0.65, pointillés si conf < 0.65 (lien supposé) */}
        {edges.map((e, i) => {
          const a = pos[e.from], b = pos[e.to];
          if (!a || !b) return null;
          const sel  = selectedId && (selectedId === e.from || selectedId === e.to);
          const conf = e.conf || 0.5;
          const dashed = conf < 0.65;
          const edgeColor = sel ? "#ffffff" : conf >= 0.75 ? "#5fffd0" : "#a0c8ff";
          return (
            <g key={i}>
              <line x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                stroke={edgeColor}
                strokeOpacity={sel ? 1 : 0.5 + conf * 0.4}
                strokeWidth={sel ? 2.2 : 0.9 + conf * 1.1}
                strokeDasharray={dashed ? "7 5" : "none"}
                markerEnd="url(#arr)"
              />
              {/* Label relation + confiance — plus visible que l'ancien */}
              <text x={(a.x + b.x) / 2} y={(a.y + b.y) / 2 - 6}
                textAnchor="middle" fontSize="9" fontFamily="JetBrains Mono"
                fill={edgeColor} opacity={sel ? 1 : 0.8}>
                {e.kind}
              </text>
              <text x={(a.x + b.x) / 2} y={(a.y + b.y) / 2 + 5}
                textAnchor="middle" fontSize="7.5" fontFamily="JetBrains Mono"
                fill={edgeColor} opacity={sel ? 0.9 : 0.55}>
                {Math.round(conf * 100)}%{dashed ? " ·?" : ""}
              </text>
            </g>
          );
        })}

        {/* Noeuds — rayon = 6 + conf * 10 (plus la confiance est haute, plus le noeud est grand) */}
        {entities.map((n) => {
          const p = pos[n.id];
          if (!p) return null;
          const ov    = overrides[n.id] || {};
          const color = ov.color || TYPE_COLORS[n.type] || "var(--accent)";
          const r = 6 + (n.conf || 0.5) * 10;
          const sel = selectedId === n.id;
          const isPinned = pinned[n.id];
          const isDragging = dragId === n.id;
          const isEditing  = editId === n.id;
          return (
            <g key={n.id} transform={`translate(${p.x}, ${p.y})`}
              style={{ cursor: isDragging ? "grabbing" : "pointer" }}
              onPointerDown={(e) => onNodeDown(e, n.id)}
              data-cursor-label={isDragging ? "déplacer" : "éditer"}>
              <circle r={r + 12} fill="transparent"/>
              <circle r={r + 8} fill={color} opacity={sel || isDragging || isEditing ? 0.28 : 0.08} />
              {/* Anneau de surbrillance quand édition en cours */}
              {isEditing && <circle r={r + 6} fill="none" stroke={color} strokeWidth="1.5" strokeDasharray="3 2" opacity="0.9"/>}
              <circle r={r} fill="var(--bg)" stroke={color} strokeWidth={sel || isDragging || isEditing ? 2.2 : 1.2} filter="url(#glow)" />
              <circle r={r * 0.4} fill={color} opacity="0.85"/>
              {isPinned && (
                <circle r={r + 4} fill="none" stroke={color} strokeWidth="0.5" strokeDasharray="2 2" opacity="0.6"/>
              )}
              <text className="node-label" textAnchor="middle" y={r + 14}>{ov.label ?? n.label}</text>
              <text className="node-sub" textAnchor="middle" y={r + 25}>{ov.sub ?? (n.sub || n.type)}</text>
            </g>
          );
        })}
      </svg>

      {/* Légende des types de noeuds + explication liens */}
      <div className="graph-legend">
        <div className="lg"><span className="sw" style={{background:"var(--accent)"}}></span>person</div>
        <div className="lg"><span className="sw" style={{background:"#ffd966"}}></span>org</div>
        <div className="lg"><span className="sw" style={{background:"#7cff9d"}}></span>email</div>
        <div className="lg"><span className="sw" style={{background:"#a0ff66"}}></span>alias</div>
        <div className="lg"><span className="sw" style={{background:"#5fffd0"}}></span>url / location</div>
        <div className="lg"><span className="sw" style={{background:"#9effaa"}}></span>phone</div>
        <div style={{marginTop:6,paddingTop:6,borderTop:"1px solid var(--line)",color:"var(--fg-3)",fontSize:10,letterSpacing:"0.08em"}}>
          <span style={{color:"#5fffd0"}}>─</span> confirmé &nbsp;
          <span style={{color:"#a0c8ff",letterSpacing:1}}>· · ·</span> supposé
        </div>
        <div style={{color:"var(--fg-3)",fontSize:10,marginTop:3}}>
          clic = éditer · glisse = déplacer
        </div>
      </div>

      {/* Panneau d'édition de nœud — apparaît au clic */}
      {editId && (
        <NodeEditPanel
          entity={entities.find(n => n.id === editId)}
          override={overrides[editId] || {}}
          onClose={() => setEditId(null)}
          onSave={(patch) => {
            setOverrides(ov => ({...ov, [editId]: {...(ov[editId]||{}), ...patch}}));
            onUpdateEntity?.(editId, patch);
            setEditId(null);
          }}
        />
      )}

      {/* Contrôles flottants — badge LIVE + bouton reset conditionnel */}
      <div className="graph-controls">
        <div className="tag tag--ok"><span className="dot dot--pulse"></span>LIVE</div>
        {Object.keys(pinned).length > 0 && (
          <button className="btn btn--ghost btn--sm" onClick={resetLayout} style={{fontSize:11}}>
            ↺ Reset layout
          </button>
        )}
      </div>
    </div>
  );
}

// ─── MapView ──────────────────────────────────────────────────────────────────
// Carte du monde stylisée avec silhouettes continentales et pins de localisation.
// La projection est équirectangulaire approchée (lng → x linéaire, lat → y linéaire)
// suffisante pour positionner des villes connues à l'échelle mondiale.
function MapView({ locations = [] }) {
  const W = 1000, H = 500;
  // Projection équirectangulaire : lat/lng → coordonnées SVG
  const project = (lat, lng) => {
    const x = ((lng + 180) / 360) * W;
    const y = ((90 - lat) / 180) * H;
    return { x, y };
  };
  return (
    <div className="map-wrap">
      <svg className="map-svg" viewBox={`0 0 ${W} ${H}`}>
        {/* Grilles de fond : petite (40px) et grande (200px) */}
        <defs>
          <pattern id="mgrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--line)" strokeWidth="0.5"/>
          </pattern>
          <pattern id="mgrid2" width="200" height="200" patternUnits="userSpaceOnUse">
            <path d="M 200 0 L 0 0 0 200" fill="none" stroke="var(--line-strong)" strokeWidth="0.6"/>
          </pattern>
        </defs>
        <rect width={W} height={H} fill="var(--bg)"/>
        <rect width={W} height={H} fill="url(#mgrid)"/>
        <rect width={W} height={H} fill="url(#mgrid2)"/>

        {/* Silhouettes continentales — paths simplifiés, rôle esthétique uniquement */}
        <g fill="none" stroke="var(--accent)" strokeWidth="0.7" opacity="0.5">
          {/* europe */}
          <path d="M450,120 L470,110 L500,108 L530,118 L560,130 L580,150 L575,180 L550,200 L520,210 L500,215 L480,200 L460,180 L450,150 Z"/>
          {/* africa */}
          <path d="M470,230 L520,225 L560,240 L580,290 L560,360 L520,400 L490,395 L470,360 L460,300 Z"/>
          {/* asia */}
          <path d="M580,110 L650,100 L730,110 L800,130 L820,180 L780,220 L720,230 L660,210 L600,180 Z"/>
          {/* north america */}
          <path d="M120,110 L180,100 L240,110 L280,130 L290,170 L260,200 L210,215 L170,200 L140,170 Z"/>
          {/* south america */}
          <path d="M230,260 L270,250 L300,290 L290,360 L260,410 L240,400 L220,360 L210,310 Z"/>
          {/* australia */}
          <path d="M780,330 L840,320 L880,340 L870,380 L830,395 L790,380 Z"/>
        </g>

        {/* Graticule : équateur + méridien central en tirets */}
        <g stroke="var(--line-strong)" strokeWidth="0.4" strokeDasharray="2 3" opacity="0.5">
          <line x1="0" y1={H/2} x2={W} y2={H/2}/>
          <line x1={W/2} y1="0" x2={W/2} y2={H}/>
        </g>

        {/* Pins de localisation avec halo, réticule et étiquette */}
        {locations.map((loc, i) => {
          const { x, y } = project(loc.lat, loc.lng);
          const r = loc.size || 8;
          return (
            <g key={i}>
              <circle cx={x} cy={y} r={r + 6} fill="var(--accent)" opacity="0.1"/>
              <circle cx={x} cy={y} r={r} fill="none" stroke="var(--accent)" strokeWidth="1"/>
              <circle cx={x} cy={y} r="2" fill="var(--accent)"/>
              {/* Réticule à 4 branches autour du pin */}
              <line x1={x - r - 4} y1={y} x2={x - r - 1} y2={y} stroke="var(--accent)"/>
              <line x1={x + r + 1} y1={y} x2={x + r + 4} y2={y} stroke="var(--accent)"/>
              <line x1={x} y1={y - r - 4} x2={x} y2={y - r - 1} stroke="var(--accent)"/>
              <line x1={x} y1={y + r + 1} x2={x} y2={y + r + 4} stroke="var(--accent)"/>
              <text x={x + r + 8} y={y + 3} fontSize="10" fontFamily="JetBrains Mono" fill="var(--fg)">
                {loc.label}
              </text>
              <text x={x + r + 8} y={y + 14} fontSize="8" fontFamily="JetBrains Mono" fill="var(--fg-mute)">
                {loc.lat.toFixed(2)}, {loc.lng.toFixed(2)}
              </text>
            </g>
          );
        })}

        {/* Crosshairs décoratifs aux 4 coins (style militaire / OSINT) */}
        <g stroke="var(--accent)" strokeWidth="1" fill="none">
          <path d="M10,10 L30,10 M10,10 L10,30"/>
          <path d={`M${W-30},10 L${W-10},10 M${W-10},10 L${W-10},30`}/>
          <path d={`M10,${H-30} L10,${H-10} M10,${H-10} L30,${H-10}`}/>
          <path d={`M${W-30},${H-10} L${W-10},${H-10} M${W-10},${H-10} L${W-10},${H-30}`}/>
        </g>

        <text x="14" y={H - 20} fontSize="9" fontFamily="JetBrains Mono" fill="var(--fg-mute)" textTransform="uppercase">
          mercator · proj.simplified · {locations.length} pin{locations.length > 1 ? "s" : ""}
        </text>
      </svg>
    </div>
  );
}

  <script type="text/babel">
/**

 *                      en trois modes d'affichage (table, cartes, kanban).
 *
 *   NewInvestigation : formulaire de création d'enquête — indices d'entrée, sélection

const { useState: _ss, useEffect: _se, useMemo: _sm, useRef: _sr } = React;

// ============================================================

// Affiche les métriques globales (actives, entités, recoupements, sources)

  return (

        </div>
        <div className="page__actions">

          <button className="btn btn--primary" onClick={onNew}><Icon n="plus" size={14}/> Nouvelle enquête</button>

      </div>

      {/* Métriques globales en 4 colonnes */}
      <div className="metric-row">
        <div className="metric">
          <div className="metric__top">

            <div className="metric__ico"><Icon n="pulse" size={14}/></div>
          </div>
          <div className="metric__value">{running}<small>/ {investigations.length}</small></div>
          <div className="metric__trend"><Icon n="bolt" size={12}/> {running > 0 ? `${running} en cours` : "Aucune en cours"}</div>
        </div>
        <div className="metric">
          <div className="metric__top">
            <div className="metric__label">Entités tracées</div>
            <div className="metric__ico"><Icon n="graph" size={14}/></div>

// ============================================================
// NEW INVESTIGATION
// ============================================================
// Formulaire de création d'enquête.
// État local :
//   title      : titre libre de l'enquête
//   note       : contexte libre (ajouté comme input "note" à la soumission)
//   inputs     : tableau d'indices {type, value} — au moins un par défaut
//   sources    : map id → boolean (état coché/décoché par source)
//   depth      : profondeur de recherche 0-4 (surface → exhaustif)
//   busy       : bloque la double soumission
function NewInvestigation({ onStart, onCancel }) {
  const { INPUT_TYPES, SOURCES_CATALOG } = window.FINDIUM;
  const [title, setTitle] = _ss("");
  const [note, setNote]   = _ss("");
  const [inputs, setInputs] = _ss([{ type: "name", value: "" }]);
  const [sources, setSources] = _ss(() => Object.fromEntries(SOURCES_CATALOG.map(s => [s.id, s.on])));
  const [depth, setDepth] = _ss(2);
  const [busy, setBusy] = _ss(false);

  const addInput = () => setInputs([...inputs, { type: "name", value: "" }]);
  const updInput = (i, k, v) => { const c = [...inputs]; c[i][k] = v; setInputs(c); };
  const delInput = (i) => setInputs(inputs.filter((_, j) => j !== i));
  const toggleSource = (id) => setSources({ ...sources, [id]: !sources[id] });
  const activeSources = SOURCES_CATALOG.filter(s => sources[s.id]);

  // Soumission : filtre les indices vides, ajoute la note si présente,
  // puis délègue à onStart() (défini dans app.jsx → startInvestigation).
  const submit = () => {
    if (busy) return;
    setBusy(true);
    const cleanInputs = inputs.filter(i => i.value.trim());
    if (note.trim()) cleanInputs.push({ type: "note", value: note.trim() });
    onStart({
      title: title || "Enquête sans titre",
      inputs: cleanInputs,
      sourcesUsed: activeSources.map(s => s.id),
      depth,
    });
  };

  const depthLabels = ["surface", "léger", "standard", "approfondi", "exhaustif"];

  return (
    <div className="page">
      <div className="page__head">
        <div className="page__title">
          <div className="crumbs">
            <span>workspace</span><span className="sep">/</span><span>dashboard</span><span className="sep">/</span><span>nouvelle</span>
          </div>
          <h1 className="h1">Nouvelle enquête</h1>
          <p>Saisis les éléments dont tu disposes, choisis tes sources, l'IA lancera la recherche et les recoupements.</p>
        </div>
        <div className="page__actions">
          <button className="btn btn--ghost" onClick={onCancel}>Annuler</button>
          <button className="btn btn--primary" onClick={submit} disabled={busy}>
            <Icon n="play" size={12}/>
            {busy ? "Initialisation…" : "Lancer l'enquête"}
          </button>
        </div>
      </div>

      {/* Grille 2 colonnes : indices (gauche) + sources + profondeur (droite) */}
      <div className="new-grid">
        {/* Colonne gauche — titre et indices */}
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          <div className="card">
            <h3 className="h3" style={{marginBottom:10}}>Titre & contexte</h3>
            <div className="field" style={{marginBottom:12}}>
              <label className="field__label">Titre de l'enquête</label>
              <input className="input" value={title} onChange={e => setTitle(e.target.value)}
                     placeholder="Ex : Réseau Blackbird — sociétés-écrans"/>
            </div>
            <div className="field">
              <label className="field__label">Contexte / note libre</label>
              <textarea className="textarea" value={note} onChange={e => setNote(e.target.value)}
                placeholder="Décris ce que tu cherches, ce que tu sais déjà, et toute hypothèse à vérifier..."/>
            </div>
          </div>

          <div className="card">
            <h3 className="h3" style={{marginBottom:10}}>Indices disponibles</h3>
            <p className="dim" style={{margin:"4px 0 12px",fontSize:12}}>
              Ajoute autant d'éléments que tu veux. L'IA s'en sert comme points de départ pour ses recoupements.
            </p>
            <div className="inputs-stack">
              {inputs.map((inp, i) => {
                const it = INPUT_TYPES.find(t => t.id === inp.type) || INPUT_TYPES[0];
                return (
                  <div key={i} className="input-row">
                    <select className="select" value={inp.type} onChange={e => updInput(i, "type", e.target.value)}>
                      {INPUT_TYPES.map(t => <option key={t.id} value={t.id}>{t.icon}  {t.label}</option>)}
                    </select>
                    <input className="input mono" value={inp.value}
                      onChange={e => updInput(i, "value", e.target.value)}
                      placeholder={it.placeholder}/>
                    <button className="del-btn" onClick={() => delInput(i)} title="Supprimer">×</button>
                  </div>
                );
              })}
            </div>
            <button className="btn btn--ghost btn--sm" style={{marginTop:12}} onClick={addInput}>
              <Icon n="plus" size={12}/> Ajouter un indice
            </button>
          </div>
        </div>

        {/* Colonne droite — profondeur + sources + résumé */}
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          <div className="card">
            <h3 className="h3" style={{marginBottom:10}}>Profondeur de recherche</h3>
            <input type="range" min="0" max="4" value={depth} onChange={e => setDepth(+e.target.value)} className="slider"/>
            <div className="depth-track">
              {depthLabels.map((l, i) => (
                <span key={i} style={{color: i === depth ? "var(--accent)" : "var(--fg-3)", fontWeight: i === depth ? 600 : 400}}>{l}</span>
              ))}
            </div>
            <p className="dim" style={{margin:"14px 0 0",fontSize:12}}>
              Mode <b className="acc">{depthLabels[depth]}</b> — ~{[3,6,12,20,30][depth]} requêtes par indice, expansion {[1,2,2,3,4][depth]} hop.
            </p>
          </div>

          <div className="card">
            <h3 className="h3" style={{marginBottom:10}}>Sources actives <span className="mute" style={{marginLeft:6}}>· {activeSources.length}/{SOURCES_CATALOG.length}</span></h3>
            <div className="source-list">
              {SOURCES_CATALOG.map(s => (
                <div key={s.id} className="source-item" data-on={sources[s.id] ? "1" : "0"} onClick={() => toggleSource(s.id)}>
                  <div className="source-item__cb">{sources[s.id] ? "✓" : ""}</div>
                  <div className="source-item__name">{s.name}<small>{s.kind}</small></div>
                  <div className="source-item__lat">~{s.lat}</div>
                  <SourceStatus status={s.status}/>
                </div>
              ))}
            </div>
          </div>

          {/* Récapitulatif + bouton de lancement secondaire */}
          <div className="card" style={{borderColor:"var(--accent-line)", background:"linear-gradient(180deg, var(--accent-mute), var(--bg-card))"}}>
            <h3 className="h3" style={{color:"var(--accent)",marginBottom:8}}>⚡ Prêt à lancer</h3>
            <p className="dim" style={{fontSize:12, margin:"0 0 12px"}}>
              {inputs.filter(i => i.value.trim()).length} indice{inputs.filter(i => i.value.trim()).length>1?"s":""} ·
              {" "}{activeSources.length} source{activeSources.length>1?"s":""} ·
              {" "}profondeur <b className="acc">{depthLabels[depth]}</b>
            </p>
            <button className="btn btn--primary btn--lg" style={{width:"100%",justifyContent:"center"}} onClick={submit} disabled={busy}>
              <Icon n="play" size={14}/> Lancer la recherche
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// CONFIG
// ============================================================
// Panneau de configuration général.
//
// Sécurité clé API :
//   - L'input est de type "password" — la valeur n'est jamais affichée.
//   - Après saveAnthropicKey() : la clé est transmise à window.claude.setKey()
//     (qui la route vers DPAPI en Electron ou localStorage en dev), puis
//     l'état local anthropicKey est vidé immédiatement.
//   - Seul keyIsSet (booléen) est conservé en état — jamais la clé elle-même.
//   - L'indicateur "Clé configurée" appelle window.claude.hasKey() de façon async
//     au montage (une seule fois), sans jamais lire la clé en clair.
function Config({ tweaks }) {
  const { SOURCES_CATALOG } = window.FINDIUM;
  const [sources, setSources] = _ss(() => Object.fromEntries(SOURCES_CATALOG.map(s => [s.id, s.on])));
  const [verbose, setVerbose] = _ss(true);
  const [autoExport, setAutoExport] = _ss(false);
  const [lang, setLang] = _ss("fr-en");
  const [region, setRegion] = _ss("eu");
  // anthropicKey : saisie temporaire, vidée après sauvegarde
  const [anthropicKey, setAnthropicKey] = _ss("");
  // keyIsSet : vrai si une clé valide est configurée dans le stockage sécurisé
  const [keyIsSet, setKeyIsSet] = _ss(false);
  // keySaved : indicateur visuel de succès (reset après 2s)
  const [keySaved, setKeySaved] = _ss(false);
  // Ollama
  const [ollamaStatus, setOllamaStatus] = _ss(null);
  const [ollamaBusy, setOllamaBusy] = _ss(false);

  // Vérification initiale du statut de la clé (async — IPC vers main process en Electron)
  _se(() => {
    if (window.claude?.hasKey) {
      Promise.resolve(window.claude.hasKey()).then(v => setKeyIsSet(!!v)).catch(() => {});
    }
    if (window.findium?.osint) {
      window.findium.osint.check()
        .then(s => setOllamaStatus(s))
        .catch(() => setOllamaStatus({ available: false }));
    }
  }, []);

  const pingOllama = async () => {
    setOllamaBusy(true);
    try {
      const s = await window.findium.osint.check();
      setOllamaStatus(s);
    } catch(e) {
      setOllamaStatus({ available: false });
    }
    setOllamaBusy(false);
  };

  // Sauvegarde de la clé : transmise au stockage sécurisé, puis état local vidé
  const saveAnthropicKey = async () => {
    await window.claude?.setKey(anthropicKey);
    const nowSet = await Promise.resolve(window.claude?.hasKey?.()).catch(() => !!anthropicKey);
    setKeyIsSet(!!nowSet);
    setAnthropicKey(""); // efface la valeur de l'input immédiatement
    setKeySaved(true);
    setTimeout(() => setKeySaved(false), 2000);
  };

  return (
    <div className="page">
      <div className="page__head">
        <div className="page__title">
          <div className="crumbs"><span>workspace</span><span className="sep">/</span><span>configuration</span></div>
          <h1 className="h1">Configuration</h1>
          <p>Sources, langue, région et préférences du moteur de recherche.</p>
        </div>
      </div>

      <div className="config-grid">
        {/* Bloc sources OSINT — toggle individuel par source */}
        <div className="config-block">
          <h3>Sources OSINT</h3>
          <p>Active ou désactive les bases interrogées par l'IA. Désactiver une source réduit la couverture mais accélère les requêtes.</p>
          {SOURCES_CATALOG.map(s => (
            <div key={s.id} className="source-config-row">
              <div className="n">{s.name}<small>{s.kind}</small></div>
              <div><SourceStatus status={s.status}/></div>
              <div className="mono-sm">~{s.lat}</div>
              <div style={{textAlign:"right"}}>
                <span className="toggle" data-on={sources[s.id]?"1":"0"} onClick={() => setSources({...sources, [s.id]: !sources[s.id]})}>
                  <span className="toggle__sw"></span>
                </span>
              </div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          {/* Bloc langue & région */}
          <div className="config-block">
            <h3>Recherche & langue</h3>
            <p>Réglages globaux du moteur.</p>
            <div className="field" style={{marginBottom:14}}>
              <label className="field__label">Langues prioritaires</label>
              <select className="select" value={lang} onChange={e => setLang(e.target.value)}>
                <option value="fr">Français uniquement</option>
                <option value="en">Anglais uniquement</option>
                <option value="fr-en">Français + Anglais</option>
                <option value="multi">Multilingue (auto)</option>
              </select>
            </div>
            <div className="field" style={{marginBottom:14}}>
              <label className="field__label">Région de référence</label>
              <select className="select" value={region} onChange={e => setRegion(e.target.value)}>
                <option value="eu">Europe</option>
                <option value="fr">France</option>
                <option value="na">Amérique du Nord</option>
                <option value="global">Mondial</option>
              </select>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:12,marginTop:6}}>
              <span className="toggle" data-on={verbose?"1":"0"} onClick={() => setVerbose(!verbose)}>
                <span className="toggle__sw"></span> Logs détaillés (étapes de raisonnement)
              </span>
              <span className="toggle" data-on={autoExport?"1":"0"} onClick={() => setAutoExport(!autoExport)}>
                <span className="toggle__sw"></span> Export PDF auto à la fin d'une enquête
              </span>
            </div>
          </div>

          {/* Bloc clés API — surlignage vert si l'utilisateur est en train de saisir */}
          <div className="config-block" style={anthropicKey ? {borderColor:"var(--accent-line)"} : {}}>
            <h3>API & clés</h3>
            <p>Identifiants pour les sources qui en demandent. Stockés localement dans le navigateur.</p>

            {/* Champ clé Anthropic — type password, jamais affiché en clair */}
            <div className="field" style={{marginBottom:14}}>
              <label className="field__label" style={{color:"var(--accent)"}}>Clé API — Anthropic (moteur IA)</label>
              <div style={{display:"flex",gap:8}}>
                <input className="input mono" type="password"
                  placeholder="sk-ant-…"
                  value={anthropicKey}
                  onChange={e => setAnthropicKey(e.target.value)}
                  style={{flex:1}}
                />
                <button className="btn btn--primary btn--sm" onClick={saveAnthropicKey}>
                  {keySaved ? <><Icon n="check" size={12}/> Sauvegardé</> : <><Icon n="key" size={12}/> Sauvegarder</>}
                </button>
              </div>
              <div style={{fontSize:11,color:"var(--fg-3)",marginTop:4}}>
                {keyIsSet
                  ? <span style={{color:"var(--accent)"}}>● Clé configurée — l'IA est active pour les nouvelles enquêtes</span>
                  : "Sans clé, les enquêtes utilisent un mode synthétique dégradé."}
              </div>
            </div>

            <div className="field" style={{marginBottom:10}}>
              <label className="field__label">Clé API — registries.eu</label>
              <input className="input mono" placeholder="aucune clé configurée"/>
            </div>
            <div className="field" style={{marginBottom:10}}>
              <label className="field__label">Clé API — leakindex</label>
              <input className="input mono" placeholder="aucune clé configurée"/>
            </div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button className="btn btn--ghost btn--sm"><Icon n="key" size={12}/> Tester les clés</button>
              <button className="btn btn--ghost btn--sm">Importer un fichier .env</button>

  const { DATA_BROKERS } = window.FINDIUM;

    const removed = Object.values(states).filter(s => s.status === "removed").length;
    const clean   = Object.values(states).filter(s => s.status === "clean").length;
    const total   = DATA_BROKERS.length;
    const exposure   = Math.round(((found + sent * 0.5) / total) * 100);
    const protection = Math.round(100 - exposure);
    return { found, sent, removed, clean, total, exposure, protection };
  }, [states]);

  // Marquer manuellement un broker comme trouvé ou propre

    const now = new Date().toISOString();

    setStates(s => ({ ...s, [id]: { ...s[id], status: "sent", requestedAt: ymd }}));
    setDraftPreview(null);
  };

  const cancelDraft = () => {
    if (!draftPreview) return;
    const id = draftPreview.broker.id;
    setStates(s => ({ ...s, [id]: { ...s[id], status: s[id].detected ? "found" : "unknown" }}));
    setDraftPreview(null);

          const now = new Date();
          const ymd = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
          return { ...s, [id]: { ...s[id], status: "sent", requestedAt: ymd }};
        });
      }
    });
  };

  const [catFilter, setCatFilter] = _es("all");

  const CATEGORIES = [...new Set(DATA_BROKERS.map(b => b.category))].sort();

  const filtered = DATA_BROKERS.filter(b => {
    const statusOk = (

      filter === "pending" ? ["sent","acknowledged"].includes(states[b.id]?.status) :
      filter === "removed" ? states[b.id]?.status === "removed" :
      filter === "clean"   ? states[b.id]?.status === "clean" :
      filter === "unknown" ? states[b.id]?.status === "unknown" : true
    );
    const catOk = catFilter === "all" || b.category === catFilter;
    return statusOk && catOk;
  });

  return (
    <>
      <div className="brokers-actions">
        <div style={{fontSize:11,color:"var(--fg-3)",display:"flex",alignItems:"center",gap:6}}>

        <div className="exp-hero__split">

      <div className="section-h" style={{marginTop:28}}>
        <h2 className="h2">Identité à protéger</h2>

        <h2 className="h2">Data brokers</h2>
        <span className="mute">{filtered.length} / {DATA_BROKERS.length}</span>
        <div className="layout-switch">
          {[
            { k:"all",     l:"Tous" },
            { k:"found",   l:"Détectés" },
            { k:"pending", l:"En cours" },
            { k:"removed", l:"Effacés" },
            { k:"clean",   l:"Propres" },
            { k:"unknown", l:"Non vérifiés" },

            <button key={f.k} data-on={filter===f.k?"1":"0"} onClick={() => setFilter(f.k)}>{f.l}</button>

        {CATEGORIES.map(c => (
          <button key={c} className="btn btn--ghost btn--sm" data-on={catFilter===c?"1":"0"}

function ExposureBar({ score }) {
  const total = score.total;
  return (
    <div className="exp-bar">
      <div className="exp-bar__seg exp-bar__seg--found"   style={{flex: score.found    || 0.001}} title={`${score.found} détectés`}/>
      <div className="exp-bar__seg exp-bar__seg--sent"    style={{flex: score.sent     || 0.001}} title={`${score.sent} en cours`}/>
      <div className="exp-bar__seg exp-bar__seg--removed" style={{flex: score.removed  || 0.001}} title={`${score.removed} effacés`}/>
      <div className="exp-bar__seg exp-bar__seg--clean"   style={{flex: score.clean    || 0.001}} title={`${score.clean} propres`}/>
      <div className="exp-bar__seg exp-bar__seg--unknown" style={{flex: (total - score.found - score.sent - score.removed - score.clean) || 0.001}} title={`non scannés`}/>

const STATUS_META = {
  unknown:       { label: "NON VÉRIFIÉ",     tag: ""           },
  clean:         { label: "PROPRE",          tag: "tag--ok"    },
  found:         { label: "DÉTECTÉ",         tag: "tag--err"   },
  drafting:      { label: "RÉDACTION…",      tag: "tag--warn"  },
  sent:          { label: "DEMANDE ENVOYÉE", tag: "tag--warn"  },

  removed:       { label: "EFFACÉ",          tag: "tag--ok"    },
};


function addDays(ymd, n) {
  const d = new Date(ymd);
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function buildRemovalPrompt(broker, identity) {
  const lines = identity.map(i => `- [${i.type}] ${i.value}`).join("\n");
  const legalRef = broker.gdpr
    ? "GDPR Article 17 (Right to Erasure) — the broker is subject to EU data protection law"
    : "applicable opt-out regulations including the California Consumer Privacy Act (CCPA) where relevant";
  return `You are a legal assistant specializing in personal data protection.
Write a short, polite but FIRM email requesting the complete erasure of a user's personal data from a data broker.

Broker: ${broker.name} (${broker.country})
Legal basis: ${legalRef}
Category: ${broker.category}

User identity to be erased:
${lines}

Requirements:
- Write entirely in English — no French, no other language
- Plain email format — no markdown, no "Subject:" header (handled separately)
- Open with "Dear Data Protection Officer," or "To Whom It May Concern,"
- Include: legal reference, explicit list of data to erase, request for written confirmation within 30 days, mention that failure to comply will be reported to the relevant supervisory authority
- 150–220 words maximum
- No bold / markdown
- Close with "Sincerely," followed by the name from the first identity item of type 'name'

Return ONLY the email body text, nothing else.`;
}

function fallbackRemovalText(broker, identity) {
  const name = identity.find(i => i.type === "name")?.value || "[Your Name]";
  const lines = identity.map(i => `  · [${i.type}] ${i.value}`).join("\n");
  const legalClause = broker.gdpr
    ? `This request is made pursuant to Article 17 of the General Data Protection Regulation (GDPR — Regulation (EU) 2016/679), which grants data subjects the right to erasure ("right to be forgotten"). Please be aware that non-compliance may be reported to the competent supervisory authority under Article 77 of the GDPR.`
    : `This request is made pursuant to applicable privacy regulations, including the California Consumer Privacy Act (CCPA) where relevant, as well as ${broker.name}'s own opt-out policies. Non-compliance may be reported to the Federal Trade Commission and the appropriate state attorney general.`;
  return `Dear Data Protection Officer,

I am writing to formally request the complete and permanent erasure of all personal data that ${broker.name} holds, processes, or distributes concerning me.

The data to be erased includes, but is not limited to:
${lines}

This request covers all of your databases, backups, sub-processors, and any partner sites that re-publish your content.

${legalClause}

Please confirm in writing, within 30 days, that all the above data has been permanently deleted and that all third-party recipients have been notified of this erasure.

Sincerely,
${name}`;
}

function DeepWebScan({ identity = [] }) {
  const [findings, setFindings] = _es(() => DEFAULT_DEEPWEB_FINDINGS);
  const [monitor, setMonitor] = _es(true);
  const [filter, setFilter] = _es("all");
  const [selectedFinding, setSelectedFinding] = _es(null);

  const counts = _em(() => ({
    total:    findings.length,
    critical: findings.filter(f => f.severity === "critical").length,
    high:     findings.filter(f => f.severity === "high").length,
    breaches: findings.filter(f => f.kind === "breach").length,
    pastes:   findings.filter(f => f.kind === "paste").length,
    forums:   findings.filter(f => f.kind === "forum").length,
    markets:  findings.filter(f => f.kind === "market").length,
    telegram: findings.filter(f => f.kind === "telegram").length,
    handled:  findings.filter(f => f.handled).length,
  }), [findings]);


  const filtered = findings.filter(f =>
    filter === "all" ? true
    : filter === "open" ? !f.handled
    : filter === "handled" ? f.handled
    : f.kind === filter);

  const markHandled = (id) => setFindings(fs => fs.map(f => f.id === id ? { ...f, handled: !f.handled } : f));

  return (
    <>
      <div className="brokers-actions">
        <span className="toggle" data-on={monitor?"1":"0"} onClick={() => setMonitor(!monitor)} style={{marginRight:4}}>
          <span className="toggle__sw"></span>

        </span>
        <div style={{fontSize:11,color:"var(--fg-3)",display:"flex",alignItems:"center",gap:6}}>

          Scan deep/dark web nécessite HIBP API ou un service Tor externe

      </div>

      <div className="deep-hero">
        <div className="deep-radar">
          <svg viewBox="0 0 240 240" className="radar-svg">
            <defs>
              <radialGradient id="radar-grad">
                <stop offset="0" stopColor="var(--accent)" stopOpacity="0.25"/>
                <stop offset="1" stopColor="var(--accent)" stopOpacity="0"/>
              </radialGradient>
              <linearGradient id="radar-sweep" x1="0" x2="1">
                <stop offset="0" stopColor="var(--accent)" stopOpacity="0"/>
                <stop offset="1" stopColor="var(--accent)" stopOpacity="0.7"/>
              </linearGradient>
            </defs>
            <circle cx="120" cy="120" r="115" fill="url(#radar-grad)"/>
            <circle cx="120" cy="120" r="115" fill="none" stroke="var(--accent-line)" strokeWidth="1"/>
            <circle cx="120" cy="120" r="85"  fill="none" stroke="var(--accent-line)" strokeWidth="0.5"/>
            <circle cx="120" cy="120" r="55"  fill="none" stroke="var(--accent-line)" strokeWidth="0.5"/>
            <circle cx="120" cy="120" r="25"  fill="none" stroke="var(--accent-line)" strokeWidth="0.5"/>
            <line x1="120" y1="5"  x2="120" y2="235" stroke="var(--accent-line)" strokeWidth="0.5"/>
            <line x1="5"  y1="120" x2="235" y2="120" stroke="var(--accent-line)" strokeWidth="0.5"/>
            <line x1="33"  y1="33"  x2="207" y2="207" stroke="var(--accent-line)" strokeWidth="0.4" strokeDasharray="2 4"/>
            <line x1="207" y1="33"  x2="33"  y2="207" stroke="var(--accent-line)" strokeWidth="0.4" strokeDasharray="2 4"/>

            <g className={"radar-sweep" + (monitor ? " radar-sweep--on" : "")} style={{transformOrigin:"120px 120px"}}>
              <path d="M120,120 L120,5 A115,115 0 0,1 220,75 Z" fill="url(#radar-sweep)" opacity="0.7"/>
              <line x1="120" y1="120" x2="120" y2="5" stroke="var(--accent)" strokeWidth="1.5"/>

            {DEEPWEB_ZONES.map((z, i) => {

            <div className="deep-metric__l">Fuites</div>
          </div>
          <div className="deep-metric">
            <div className="deep-metric__v">{counts.pastes}</div>

  <script type="text/babel">
/**
 * investigation.jsx — Vue détaillée d'une enquête + Runner IA
 *
 * Deux responsabilités distinctes dans ce fichier :
 *
 * 1. COMPOSANTS UI
 *    InvestigationView  — shell avec header, terminal live et onglets
 *    InvLeftPane        — panneau gauche : log terminal + ticker sources
 *    TimelineView       — chronologie des événements détectés
 *    FicheView          — fiche structurée (indices, entités, recoupements)
 *    ReportView         — rapport exécutif final généré par l'IA
 *
 * 2. RUNNER IA (runInvestigation)
 *    Orchestre les 4 phases d'une enquête :
 *      Phase 01 — Ingestion & normalisation des indices
 *      Phase 02 — Interrogation simulée des sources OSINT
 *      Phase 03 — Appel à Claude (via window.claude.complete) pour la synthèse
 *      Phase 04 — Consolidation et finalisation
 *    À chaque étape, onUpdate() est appelé → le terminal se met à jour en live.
 */

const { useState: _is, useEffect: _ie, useMemo: _im, useRef: _ir, useCallback: _ic } = React;


// ─── InvestigationView ────────────────────────────────────────────────────────

function InvestigationView({ inv, onBack, onUpdate, onDelete }) {
  const [tab, setTab] = _is("graph");
  const [selectedNode, setSelectedNode] = _is(null);
  const [confirmDelete, setConfirmDelete] = _is(false);

  if (!inv) return null;

  const handleDelete = () => {
    onDelete?.(inv.id);
    onBack();
  };

  return (
    <div className="inv-shell">

      {/* ── Header : identité + statut + barre de progression ───────── */}
      <div className="inv-head">
        <div className="inv-head__left">
          <div className="inv-head__id">{inv.id} · {inv.classif}</div>
          <h1 className="h1">{inv.title}</h1>
          <div className="inv-head__meta">
            <span>opérateur · <b>{inv.operator}</b></span>
            <span>démarrée · <b>{inv.createdAt}</b></span>
            <span>écoulé · <b>{inv.elapsed}</b></span>
            <span>indices · <b>{inv.inputs?.length || 0}</b></span>
          </div>
          {/* Barre de progression — visible uniquement pendant l'exécution */}
          {inv.status === "running" && (
            <div className="inv-progress">
              <Bar value={inv.progress || 0}/>
              <div className="pct">{Math.round((inv.progress || 0) * 100)}%</div>
            </div>
          )}
        </div>

        <div className="inv-head__actions">
          <StatusTag status={inv.status}/>
          {inv.status === "running" && (
            <>
              <button className="btn btn--ghost btn--sm"><Icon n="pause" size={12}/> Pause</button>
              <button className="btn btn--danger btn--sm"><Icon n="stop" size={12}/> Abort</button>
            </>
          )}
          <button className="btn btn--ghost btn--sm"><Icon n="share" size={12}/> Partager</button>
          <button className="btn btn--ghost btn--sm"><Icon n="download" size={12}/> Export</button>
          {inv.status !== "running" && (
            <button className="btn btn--danger btn--sm" onClick={() => setConfirmDelete(true)}>
              <Icon n="x" size={12}/> Supprimer
            </button>
          )}
          <button className="btn btn--ghost btn--sm" onClick={onBack}>← Retour</button>
        </div>
      </div>

      {confirmDelete && (
        <div className="modal-overlay" onClick={() => setConfirmDelete(false)}>
          <div className="modal" style={{maxWidth:420}} onClick={e => e.stopPropagation()}>
            <div className="modal__head">
              <div>
                <div className="modal__sub" style={{color:"var(--err)"}}>Action irréversible</div>
                <div className="modal__title">Supprimer cette enquête ?</div>
              </div>
              <button className="btn btn--ghost btn--icon" onClick={() => setConfirmDelete(false)}><Icon n="x" size={14}/></button>
            </div>
            <div className="modal__body">
              <p style={{color:"var(--fg-1)",fontSize:13,margin:0}}>
                L'enquête <b>{inv.id}</b> — <i>{inv.title}</i> sera définitivement supprimée.
                Log, graphe, rapport et toutes les entités associées seront perdus.
              </p>
            </div>
            <div className="modal__foot">
              <div/>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn--ghost" onClick={() => setConfirmDelete(false)}>Annuler</button>
                <button className="btn btn--danger" onClick={handleDelete}>
                  <Icon n="x" size={12}/> Supprimer définitivement
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── Corps : terminal gauche | contenu tabulaire droit ────────── */}
      <div className="inv-body">
        <InvLeftPane inv={inv}/>

        <div className="inv-right">
          {/* Onglets de visualisation */}
          <div className="tabs">
            <button className="tab" data-on={tab==="graph"?"1":"0"} onClick={() => setTab("graph")}>
              <Icon n="graph" size={14}/> Graphe <span className="count">{inv.entities?.length || 0}</span>
            </button>
            <button className="tab" data-on={tab==="timeline"?"1":"0"} onClick={() => setTab("timeline")}>
              <Icon n="timeline" size={14}/> Timeline <span className="count">{inv.timeline?.length || 0}</span>
            </button>
            <button className="tab" data-on={tab==="map"?"1":"0"} onClick={() => setTab("map")}>
              <Icon n="map" size={14}/> Carte <span className="count">{inv.locations?.length || 0}</span>
            </button>
            <button className="tab" data-on={tab==="fiche"?"1":"0"} onClick={() => setTab("fiche")}>
              <Icon n="file" size={14}/> Fiche
            </button>
            <button className="tab" data-on={tab==="report"?"1":"0"} onClick={() => setTab("report")}>
              <Icon n="report" size={14}/> Rapport
            </button>
          </div>

          {tab === "graph"    && <div className="pane pane--graph"><NetworkGraph entities={inv.entities || []} edges={inv.edges || []} onSelect={setSelectedNode} selectedId={selectedNode}
            onUpdateEntity={(id, patch) => onUpdate({...inv, entities: (inv.entities||[]).map(e => e.id===id ? {...e,...patch} : e)})}
          /></div>}
          {tab === "timeline" && <div className="pane"><TimelineView events={inv.timeline || []}/></div>}
          {tab === "map"      && <div className="pane"><MapView locations={inv.locations || []}/></div>}
          {tab === "fiche"    && <div className="pane"><FicheView inv={inv}/></div>}
          {tab === "report"   && <div className="pane"><ReportView inv={inv}/></div>}
        </div>
      </div>
    </div>
  );
}


// ─── InvLeftPane : terminal live + ticker sources ────────────────────────────

function InvLeftPane({ inv }) {
  const termRef = _ir(null);

  // Auto-scroll vers le bas à chaque nouvelle ligne de log
  _ie(() => {
    if (termRef.current) termRef.current.scrollTop = termRef.current.scrollHeight;
  }, [inv.log?.length]);

  return (
    <div className="inv-left">
      <div className="inv-left__head">
        <span style={{color:"var(--accent)"}}>●</span> live log{" "}
        <b>{inv.status === "running" ? "// STREAM" : "// STATIC"}</b>
        <span style={{marginLeft:"auto",color:"var(--fg-3)",fontFamily:"var(--font-mono)",fontSize:11}}>
          {(inv.log||[]).length} lines
        </span>
      </div>

      {/* Terminal — dangerouslySetInnerHTML utilisé car les logs contiennent du HTML
          léger (<b>, <i>) généré par le runner (pas d'input utilisateur, pas de XSS risk) */}
      <div className="term" ref={termRef}>
        {(inv.log || []).map((l, i) => (
          <div key={i} className={"l" + (l.lv === "step" ? " l--step" : "")}>
            <span className="ts">{l.ts || formatTs(i)}</span>
            <span className={"lv lv--" + (l.lv || "info")}>[{(l.lv||"info").toUpperCase()}]</span>
            <span className="ms" dangerouslySetInnerHTML={{__html: l.ms}}/>
          </div>
        ))}
        {/* Curseur clignotant pendant l'exécution */}
        {inv.status === "running" && (
          <div className="l">
            <span className="ts">{formatTs((inv.log||[]).length)}</span>
            <span className="lv lv--query">[QUERY]</span>
            <span className="ms"><span className="cursor"></span></span>
          </div>
        )}
      </div>

      {/* Ticker sources : statut et hits par source interrogée */}
      <div className="inv-left__foot">
        <h3 className="h3" style={{marginBottom:8,color:"var(--fg)"}}>Sources interrogées</h3>
        <div className="src-tick">
          {(inv.sources || []).map((s, i) => (
            <div key={i} className="src-tick__row">
              <span className="nm">{s.name}</span>
              <SourceStatus status={s.status}/>
              <span className="ms">{s.hits || 0}h · {s.latency}ms</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/**
 * Convertit un index de ligne de log en timestamp HH:MM:SS.
 * Seed basé sur 14h08 (heure de la démo initiale) + 17s par ligne.
 */
function formatTs(seed) {
  const base = 14 * 3600 + 8 * 60;
  const t    = base + seed * 17;
  const pad  = n => String(n).padStart(2, "0");
  return `${pad(Math.floor(t / 3600) % 24)}:${pad(Math.floor(t / 60) % 60)}:${pad(t % 60)}`;
}


// ─── TimelineView ─────────────────────────────────────────────────────────────

function TimelineView({ events }) {
  if (!events.length) return (
